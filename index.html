<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кликер Дмитрия</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --gold: #ffd700;
    --text: #eaeaea;
    --muted: #888;
    --common: #aaaaaa;
    --rare: #4dabf7;
    --epic: #cc5de8;
    --legendary: #ffd43b;
    --mythic: #ff6b35;
    --divine: #00f5ff;
    --cursed: #39ff14;
    --cosmic: #ff1493;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a0a2e44 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #0f346044 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 420px; margin: 0 auto; padding: 16px; }

  .header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding: 14px 18px;
    background: var(--card); border-radius: 18px; border: 1px solid #ffffff10;
  }
  .dmitriy-avatar {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), #ff8c42);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0; box-shadow: 0 0 20px #e9456044;
  }
  .header-name { font-family: 'Russo One', sans-serif; font-size: 16px; color: var(--accent); letter-spacing: 1px; }
  .header-phrase { font-size: 12px; color: var(--muted); margin-top: 2px; min-height: 16px; transition: opacity 0.3s; }

  .coins-display {
    text-align: center; margin-bottom: 24px; padding: 20px;
    background: var(--card); border-radius: 20px; border: 1px solid #ffffff10;
    position: relative; overflow: hidden;
  }
  .coins-display::after {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: conic-gradient(transparent 340deg, #ffd70011 360deg);
    animation: rotate 4s linear infinite; pointer-events: none;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  .coins-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .coins-value {
    font-family: 'Russo One', sans-serif; font-size: 42px;
    color: var(--gold); text-shadow: 0 0 30px #ffd70055; line-height: 1; transition: transform 0.1s;
  }
  .coins-value.bump { transform: scale(1.08); }
  .coins-stats { display: flex; justify-content: center; gap: 24px; margin-top: 12px; }
  .stat-item { text-align: center; }
  .stat-val { font-size: 15px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .click-area { display: flex; justify-content: center; margin-bottom: 24px; position: relative; }
  .click-btn {
    width: 170px; height: 170px; border-radius: 50%; border: none;
    background: radial-gradient(circle at 35% 35%, #ff8585, var(--accent), #a0231b);
    cursor: pointer; transition: transform 0.1s cubic-bezier(.25,.46,.45,.94), box-shadow 0.1s;
    box-shadow: 0 0 0 0 #e9456000, 0 0 50px #e9456077, 0 10px 40px #00000077;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    position: relative; overflow: visible;
    animation: btnPulse 2.5s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 50px #e9456066, 0 0 0 0 #e9456044, 0 10px 40px #00000077; }
    50%       { box-shadow: 0 0 70px #e9456099, 0 0 0 18px #e9456000, 0 10px 40px #00000077; }
  }
  .click-btn::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    background: conic-gradient(#e94560, #ff8c42, #ffd700, #e94560);
    z-index: -1; opacity: 0.5;
    animation: spinRing 3s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .click-btn::after {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    background: var(--bg); z-index: -1;
  }
  .click-btn.clicked {
    animation: btnHit 0.25s cubic-bezier(.36,.07,.19,.97) forwards, btnPulse 2.5s ease-in-out 0.25s infinite;
  }
  @keyframes btnHit {
    0%   { transform: scale(1); }
    30%  { transform: scale(0.88); }
    60%  { transform: scale(1.07); }
    100% { transform: scale(1); }
  }
  .click-btn-icon { font-size: 56px; pointer-events: none; transition: transform 0.1s; }
  .click-btn-label { font-family: 'Russo One', sans-serif; font-size: 12px; color: #fff; letter-spacing: 2px; pointer-events: none; margin-top: 2px; }

  /* Ripple */
  .ripple {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #ffffff44 0%, transparent 70%);
    pointer-events: none; transform: scale(0);
    animation: rippleOut 0.5s ease-out forwards;
    z-index: 200;
  }
  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  /* Shockwave ring */
  .shockwave {
    position: absolute; border-radius: 50%;
    border: 2px solid #e9456088;
    width: 170px; height: 170px;
    pointer-events: none;
    animation: shockOut 0.5s ease-out forwards;
  }
  @keyframes shockOut {
    0%   { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .float-text {
    position: absolute; font-family: 'Russo One', sans-serif;
    font-size: 22px; font-weight: 900;
    color: var(--gold); text-shadow: 0 0 12px #ffd700aa, 0 2px 4px #000; pointer-events: none;
    animation: floatUp 0.9s cubic-bezier(.22,.68,0,1.2) forwards; z-index: 100;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(0.8) rotate(-5deg); }
    30%  { opacity: 1; transform: translateY(-25px) scale(1.2) rotate(3deg); }
    100% { opacity: 0; transform: translateY(-90px) scale(0.9) rotate(-2deg); }
  }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab {
    flex: 1; padding: 10px; border: none; border-radius: 12px;
    background: var(--card); color: var(--muted);
    font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 15px #e9456055; }

  .shop { display: flex; flex-direction: column; gap: 10px; }
  .upgrade-card {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    background: var(--card); border-radius: 16px; border: 1px solid #ffffff08;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .upgrade-card:active { transform: scale(0.98); }
  .upgrade-card.affordable:hover { border-color: var(--accent); box-shadow: 0 0 20px #e9456022; }
  .upgrade-card.bought { opacity: 0.5; cursor: default; }
  .upgrade-card.cant-afford { opacity: 0.6; cursor: not-allowed; }
  .upgrade-rarity-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .rarity-Common .upgrade-rarity-bar { background: var(--common); }
  .rarity-Rare .upgrade-rarity-bar { background: var(--rare); }
  .rarity-Epic .upgrade-rarity-bar { background: var(--epic); }
  .rarity-Legendary .upgrade-rarity-bar { background: var(--legendary); box-shadow: 0 0 10px var(--legendary); }
  .rarity-Mythic .upgrade-rarity-bar { background: var(--mythic); box-shadow: 0 0 12px var(--mythic); }
  .rarity-Divine .upgrade-rarity-bar { background: var(--divine); box-shadow: 0 0 14px var(--divine); }
  .rarity-Cursed .upgrade-rarity-bar { background: var(--cursed); box-shadow: 0 0 12px var(--cursed); }
  .rarity-Cosmic .upgrade-rarity-bar { background: linear-gradient(var(--cosmic), var(--divine)); box-shadow: 0 0 16px var(--cosmic); }
  .rarity-Mythic.upgrade-card { background: linear-gradient(135deg, #16213e, #2a1000); border-color: #ff6b3522; }
  .rarity-Mythic.upgrade-card.affordable:hover { border-color: var(--mythic); box-shadow: 0 0 24px #ff6b3533; }
  .rarity-Divine.upgrade-card { background: linear-gradient(135deg, #16213e, #001a2a); border-color: #00f5ff22; }
  .rarity-Divine.upgrade-card.affordable:hover { border-color: var(--divine); box-shadow: 0 0 28px #00f5ff44; }
  .rarity-Cursed.upgrade-card { background: linear-gradient(135deg, #0a1a0a, #16213e); border-color: #39ff1422; }
  .rarity-Cursed.upgrade-card.affordable:hover { border-color: var(--cursed); box-shadow: 0 0 28px #39ff1444; }
  .rarity-Cosmic.upgrade-card { background: linear-gradient(135deg, #1a0020, #00101a); border-color: #ff149344; }
  .rarity-Cosmic.upgrade-card.affordable:hover { border-color: var(--cosmic); box-shadow: 0 0 40px #ff149366; }
  @keyframes cosmicPulse { 0%,100% { box-shadow: 0 0 20px #ff149355; } 50% { box-shadow: 0 0 50px #00f5ff55; } }
  .rarity-Cosmic.upgrade-card { animation: cosmicPulse 2.5s ease-in-out infinite; }
  .upgrade-icon { font-size: 28px; flex-shrink: 0; }
  .upgrade-info { flex: 1; min-width: 0; }
  .upgrade-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upgrade-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rarity-Common .upgrade-name { color: var(--common); }
  .rarity-Rare .upgrade-name { color: var(--rare); }
  .rarity-Epic .upgrade-name { color: var(--epic); }
  .rarity-Legendary .upgrade-name { color: var(--legendary); }
  .rarity-Mythic .upgrade-name { color: var(--mythic); text-shadow: 0 0 8px #ff6b3566; }
  .rarity-Divine .upgrade-name { color: var(--divine); text-shadow: 0 0 8px #00f5ff66; }
  .rarity-Cursed .upgrade-name { color: var(--cursed); text-shadow: 0 0 8px #39ff1466; }
  .rarity-Cosmic .upgrade-name { background: linear-gradient(90deg, var(--cosmic), var(--divine), var(--cosmic)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 6px var(--cosmic)); }
  .upgrade-cost { font-family: 'Russo One', sans-serif; font-size: 13px; color: var(--gold); flex-shrink: 0; text-align: right; }
  .upgrade-cost.bought-label { color: #4caf50; font-size: 11px; }

  .stats-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: var(--card); border-radius: 16px; padding: 16px; border: 1px solid #ffffff08; text-align: center; }
  .stat-card-val { font-family: 'Russo One', sans-serif; font-size: 24px; color: var(--accent); }
  .stat-card-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .leaderboard { display: flex; flex-direction: column; gap: 8px; }
  .lb-card {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--card); border-radius: 14px; border: 1px solid #ffffff08;
  }
  .lb-card.top1 { border-color: #ffd70044; background: linear-gradient(135deg, #1a1a2e, #2a2000); }
  .lb-card.top2 { border-color: #aaaaaa44; }
  .lb-card.top3 { border-color: #cd7f3244; }
  .lb-card.me { border-color: #e9456066; }
  .lb-rank { font-family: 'Russo One', sans-serif; font-size: 18px; width: 32px; text-align: center; flex-shrink: 0; }
  .lb-name { flex: 1; font-weight: 700; font-size: 14px; }
  .lb-coins { font-family: 'Russo One', sans-serif; font-size: 14px; color: var(--gold); }
  .lb-loading { text-align: center; color: var(--muted); padding: 30px; font-size: 14px; }
  .refresh-btn {
    display: block; margin: 0 auto 12px;
    padding: 8px 20px; background: var(--card); border: 1px solid #ffffff15;
    border-radius: 20px; color: var(--muted); font-size: 12px;
    font-family: 'Nunito', sans-serif; font-weight: 700; cursor: pointer;
  }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1a2e; border: 1px solid var(--accent); color: var(--text);
    padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 700;
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 20px #e9456033;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .section-hidden { display: none; }

  /* ADMIN PANEL */
  .admin-panel { display: flex; flex-direction: column; gap: 12px; }
  .admin-title { font-family: 'Russo One', sans-serif; font-size: 18px; color: var(--accent); text-align: center; padding: 10px; letter-spacing: 2px; text-shadow: 0 0 20px #e9456066; }
  .admin-card { background: var(--card); border-radius: 16px; padding: 16px; border: 1px solid #e9456033; margin-bottom: 4px; }
  .admin-card-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .admin-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .admin-input { flex: 1; background: #0f0f1a; border: 1px solid #ffffff15; border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; outline: none; }
  .admin-input:focus { border-color: var(--accent); }
  .admin-btn { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; transition: all 0.2s; }
  .admin-btn-red { background: var(--accent); color: #fff; }
  .admin-btn-green { background: #2ecc71; color: #fff; }
  .admin-btn-blue { background: #4dabf7; color: #000; }
  .admin-users-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
  .admin-user-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #0f0f1a; border-radius: 10px; border: 1px solid #ffffff08; }
  .admin-user-name { flex: 1; font-size: 13px; font-weight: 700; }
  .admin-user-coins { font-size: 12px; color: var(--gold); }
  .admin-mini-btn { padding: 4px 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif; }

  /* EASTER EGG */
  .easter-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .easter-overlay.show { opacity: 1; pointer-events: all; }
  .easter-box {
    background: var(--card); border-radius: 24px; padding: 28px 24px;
    border: 2px solid var(--accent); text-align: center; max-width: 320px; width: 90%;
    transform: scale(0.7); transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 60px #e9456066;
  }
  .easter-overlay.show .easter-box { transform: scale(1); }
  .easter-emoji { font-size: 80px; display: block; animation: wobble 0.6s ease-in-out infinite alternate; }
  @keyframes wobble {
    0% { transform: rotate(-8deg) scale(1); }
    100% { transform: rotate(8deg) scale(1.1); }
  }
  .easter-title {
    font-family: 'Russo One', sans-serif; font-size: 20px;
    color: var(--accent); margin: 14px 0 8px; letter-spacing: 1px;
    text-shadow: 0 0 20px #e9456088;
  }
  .easter-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .easter-close {
    margin-top: 20px; padding: 10px 28px; background: var(--accent);
    border: none; border-radius: 30px; color: #fff;
    font-family: 'Russo One', sans-serif; font-size: 13px;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px #e9456055; transition: transform 0.1s;
  }
  .easter-close:active { transform: scale(0.95); }
  .dmitriy-avatar { cursor: pointer; transition: transform 0.15s; }

  /* EVENT BUTTON */
  .event-btn {
    position: fixed; right: 0; top: 50%; transform: translateY(-50%);
    z-index: 500; cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    background: linear-gradient(180deg, #1a0a2e, #0f1a2e);
    border: 1px solid #ffffff15; border-right: none;
    border-radius: 14px 0 0 14px;
    padding: 10px 8px; gap: 6px;
    box-shadow: -4px 0 24px #00000066;
    transition: transform 0.2s, background 0.2s;
  }
  .event-btn:active { transform: translateY(-50%) scale(0.95); }
  .event-cover {
    width: 40px; height: 40px; border-radius: 10px; overflow: hidden;
    background: linear-gradient(135deg, #1a0030, #001030);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; position: relative;
    box-shadow: 0 0 12px #8800ff44;
    border: 1px solid #8800ff44;
  }
  .event-cover::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, #8800ff22, transparent 60%, #00aaff11);
    pointer-events: none;
  }
  @keyframes eventGlow {
    0%,100% { box-shadow: 0 0 12px #8800ff55; }
    50%      { box-shadow: 0 0 22px #00aaff77; }
  }
  .event-cover { animation: eventGlow 2s ease-in-out infinite; }
  .event-label {
    font-family: 'Russo One', sans-serif; font-size: 8px; color: #ffffff88;
    letter-spacing: 1px; writing-mode: vertical-rl; text-orientation: mixed;
    transform: rotate(180deg);
  }
  .event-pulse {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 6px var(--accent);
  }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.7); } }

  /* EVENT MODAL */
  .event-overlay {
    position: fixed; inset: 0; z-index: 9990;
    background: rgba(0,0,0,0.88);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .event-overlay.show { opacity: 1; pointer-events: all; }
  .event-modal {
    background: linear-gradient(160deg, #0d0020, #001020, #0a0015);
    border: 1px solid #8800ff44; border-radius: 24px;
    padding: 0; width: 88%; max-width: 340px; overflow: hidden;
    transform: scale(0.85) translateY(30px);
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2);
    box-shadow: 0 0 60px #8800ff33, 0 20px 60px #00000088;
  }
  .event-overlay.show .event-modal { transform: scale(1) translateY(0); }
  .event-modal-cover {
    width: 100%; height: 160px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1a0030 0%, #000820 50%, #001a30 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .event-modal-cover-emoji { font-size: 80px; filter: drop-shadow(0 0 20px #8800ffaa); z-index: 1; }
  .event-modal-cover::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, #8800ff22 0%, transparent 70%);
  }
  .event-modal-cover::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(transparent, #0d0020);
  }
  .event-modal-body { padding: 20px 22px 24px; }
  .event-modal-title {
    font-family: 'Russo One', sans-serif; font-size: 20px;
    color: #ffffff; letter-spacing: 2px; text-align: center; margin-bottom: 6px;
    text-shadow: 0 0 20px #8800ffaa;
  }
  .event-modal-sub { font-size: 11px; color: #888; text-align: center; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }
  .countdown-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .countdown-cell {
    background: #ffffff08; border-radius: 12px; padding: 12px 6px;
    text-align: center; border: 1px solid #ffffff0f;
  }
  .countdown-val {
    font-family: 'Russo One', sans-serif; font-size: 24px; color: #fff;
    text-shadow: 0 0 12px #8800ff88; line-height: 1;
  }
  .countdown-lbl { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .event-close-btn {
    width: 100%; padding: 12px; background: #ffffff08; border: 1px solid #ffffff15;
    border-radius: 12px; color: #888; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .event-close-btn:active { background: #ffffff12; }
  .dmitriy-avatar:active { transform: scale(0.88); }

  /* ACHIEVEMENTS */
  .achieve-panel { display: flex; flex-direction: column; gap: 10px; }
  .achieve-header {
    text-align: center; padding: 14px;
    background: var(--card); border-radius: 18px; border: 1px solid #ffd70022;
    margin-bottom: 4px;
  }
  .achieve-header-title { font-family: 'Russo One', sans-serif; font-size: 16px; color: var(--gold); letter-spacing: 1px; }
  .achieve-header-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .achieve-progress-bar-wrap { background: #0f0f1a; border-radius: 20px; height: 6px; margin: 8px 0 0; overflow: hidden; }

    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?user_id=eq.${tgUser.id}&select=coins,total_clicks,bought`, {

      if (supaCoins < localCoins * 0.5 && localCoins > 100) {
        state.coins = supaCoins;
        state.totalClicks = supaClicks;
      } else {
        // Иначе берём максимум — защита от потери прогресса + /addcoins подтягивается автоматически
        state.coins = Math.max(localCoins, supaCoins);
        state.totalClicks = Math.max(state.totalClicks, supaClicks);
      }
      // Восстанавливаем улучшения из Supabase (если там меньше — значит админ сбросил)
      if (row.bought !== null && row.bought !== undefined) {
        try {
          const supaBought = typeof row.bought === 'string' ? JSON.parse(row.bought) : (row.bought || []);
          // Если Supabase сбросил улучшения (пустой массив) — слушаемся
          if (supaBought.length < state.bought.length && state.bought.length > 0 && localCoins > 100) {
            state.bought = supaBought;
            // Пересчитываем бонусы
            state.perClick = 1;
            state.auto = 0;
            supaBought.forEach(id => {
              const upg = UPGRADES.find(u => u.id === id);
              if (upg) { state.auto += upg.auto; state.perClick += upg.multi; }
            });
          }
        } catch(e) {}
      }
      try { localStorage.setItem('dmitriy_clicker', JSON.stringify(state)); } catch(e) {}
      updateUI();
    }
  } catch(e) {}
}

let countdownInterval = null;
function updateCountdown() {
  const target = new Date('2026-05-01T00:00:00');
  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('cd-days').textContent = '00';
      document.getElementById('cd-hours').textContent = '00';
      document.getElementById('cd-mins').textContent = '00';
      document.getElementById('cd-secs').textContent = '00';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
  }
  tick();
  clearInterval(countdownInterval);
  countdownInterval = setInterval(tick, 1000);
}

  document.getElementById('coins').textContent = formatNum(state.coins);

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return Math.floor(n).toString();
}
let lastClickTime = 0;
let clickIntervals = [];
let banned = false;
function handleClick(e) {
  if (banned) {
    showToast('🚫 Дмитрий забанил тебя за читерство!');
    return;
  }

  const now = Date.now();
  const interval = now - lastClickTime;
  lastClickTime = now;

  // Слишком быстро (быстрее 50мс = автокликер)
  if (interval < 50 && interval > 0) {
    clickIntervals.push(interval);
  } else {
    clickIntervals = []; // сбрасываем если нормальный клик
  }

  // 5+ подозрительных кликов подряд = бан
  if (clickIntervals.length >= 5) {
    banned = true;
    state.coins = 0;
    state.totalClicks = 0;
    save();
    showToast('🚫 Читер обнаружен! Очки обнулены!');
    return;
  }

  state.coins += state.perClick;
  state.totalClicks++;

  // Проверка speedClicks (10 кликов за 3 секунды)
  if (!state._speedBuf) state._speedBuf = [];
  state._speedBuf.push(Date.now());
  state._speedBuf = state._speedBuf.filter(t => Date.now() - t < 2000);
  if (state._speedBuf.length >= 15) {
    if (!state.speedClicks) state.speedClicks = 0;
    state.speedClicks = Math.max(state.speedClicks, state._speedBuf.length);
  }

  // Проверка ночного клика (23:00–04:00)
  const hr = new Date().getHours();
  if (hr >= 23 || hr < 4) state.nightClick = true;

  const el = document.getElementById('coins');
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 100);
  spawnFloat(e, '+' + state.perClick);
  spawnClickFX(e);
  if (state.totalClicks % 10 === 0) setPhrase(PHRASES[Math.floor(Math.random()*PHRASES.length)]);
  updateUI(); renderShop(); checkAchievements();
  if (state.totalClicks % 5 === 0) save();
  if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
}
  
function spawnFloat(e, text) {
  const area = document.getElementById('click-area');
  const rect = area.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-text'; el.textContent = text;
  el.style.left = ((e.clientX||rect.left+rect.width/2)-rect.left-20)+'px';
  el.style.top = ((e.clientY||rect.top+rect.height/2)-rect.top-20)+'px';
  area.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function spawnClickFX(e) {
  const area = document.getElementById('click-area');
  const rect = area.getBoundingClientRect();
  const cx = (e.clientX || rect.left + rect.width/2) - rect.left;
  const cy = (e.clientY || rect.top + rect.height/2) - rect.top;

  // Ripple на кнопке
  const rip = document.createElement('div');
  rip.className = 'ripple';
  rip.style.width = rip.style.height = '60px';
  rip.style.left = (cx - 30) + 'px';
  rip.style.top = (cy - 30) + 'px';
  area.appendChild(rip);
  setTimeout(() => rip.remove(), 500);

  // Shockwave ring
  const sw = document.createElement('div');
  sw.className = 'shockwave';
  sw.style.left = (rect.width/2 - 85) + 'px';
  sw.style.top = (rect.height/2 - 85) + 'px';
  area.appendChild(sw);
  setTimeout(() => sw.remove(), 500);

  // Кнопка bounce
  const btn = document.querySelector('.click-btn');
  btn.classList.remove('clicked');
  void btn.offsetWidth;
  btn.classList.add('clicked');
}

function setPhrase(text) {
  const el = document.getElementById('phrase');
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = text; el.style.opacity = 1; }, 150);
}

function renderShop() {
  const el = document.getElementById('tab-shop');
  el.innerHTML = '';
  for (const upg of UPGRADES) {
    const bought = state.bought.includes(upg.id);
    const canAfford = state.coins >= upg.cost;
    const div = document.createElement('div');
    div.className = `upgrade-card rarity-${upg.rarity} ${bought?'bought':canAfford?'affordable':'cant-afford'}`;
    div.innerHTML = `<div class="upgrade-rarity-bar"></div><div class="upgrade-icon">${upg.icon}</div>
      <div class="upgrade-info"><div class="upgrade-name">${upg.name}</div><div class="upgrade-desc">${upg.desc}</div></div>
      <div class="upgrade-cost ${bought?'bought-label':''}">${bought?'✅ Куплено':'💰 '+formatNum(upg.cost)}</div>`;
    if (!bought) div.onclick = () => buyUpgrade(upg.id);
    el.appendChild(div);
  }
}

function buyUpgrade(id) {
  const upg = UPGRADES.find(u => u.id === id);
  if (!upg || state.bought.includes(id)) return;
  if (state.coins < upg.cost) { showToast('😢 Не хватает монет!'); return; }
  state.coins -= upg.cost; state.bought.push(id);
  state.auto += upg.auto; state.perClick += upg.multi;
  setPhrase('Дмитрий одобряет! 👍'); showToast('✅ ' + upg.name + ' куплено!');
  updateUI(); renderShop(); checkAchievements(); save();
  if (window.Telegram?.WebApp?.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
}

function showToast(msg) {

  t.textContent = msg; t.classList.add('show');
  if (window._toastTimer) clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

updateUI(); renderShop(); syncToSupabase();
</script>
</body>
</html>
